<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souty Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #6C63FF; --bg: #0F0F0F; --card: #1A1A1A; --text: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out; }

        .auth-container { width: 100%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); border: 1px solid #222; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; font-weight: 600; }
        
        .input-group { margin-bottom: 20px; width: 100%; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #888; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: white; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(108, 99, 255, 0.2); }
        
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-outline { background: transparent; border: 1px solid #444; color: #bbb; margin-top: 15px; }

        .step-dots { display: flex; justify-content: center; margin-top: 25px; gap: 10px; }
        .dot { width: 10px; height: 10px; background: #333; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--primary); box-shadow: 0 0 8px var(--primary); }

        /* شاشة الواجهة الرئيسية المؤقتة */
        #main-app { background: var(--bg); justify-content: flex-start; padding-top: 50px; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div id="login-screen" class="screen active">
    <div class="auth-container">
        <h2>تسجيل الدخول</h2>
        <div class="input-group">
            <input type="email" id="login-email" placeholder="البريد الإلكتروني">
        </div>
        <div class="input-group">
            <input type="password" id="login-pass" placeholder="كلمة المرور">
        </div>
        <button class="btn btn-primary" onclick="handleLogin()">دخول</button>
        <button class="btn btn-outline" onclick="showScreen('reg-step-1')">إنشاء حساب جديد</button>
    </div>
</div>

<div id="reg-step-1" class="screen">
    <div class="auth-container">
        <h2>خطوة 1/4</h2>
        <div class="input-group">
            <label>الدولة</label>
            <select id="reg-country" onchange="updateCountryCode()">
                <option value="">اختر الدولة</option>
                <option value="+20">مصر (+20)</option>
                <option value="+966">السعودية (+966)</option>
                <option value="+971">الإمارات (+971)</option>
                <option value="+965">الكويت (+965)</option>
                <option value="+974">قطر (+974)</option>
                <option value="+968">عمان (+968)</option>
                <option value="+973">البحرين (+973)</option>
                <option value="+962">الأردن (+962)</option>
                <option value="+964">العراق (+964)</option>
                <option value="+961">لبنان (+961)</option>
                <option value="+963">سوريا (+963)</option>
                <option value="+970">فلسطين (+970)</option>
                <option value="+212">المغرب (+212)</option>
                <option value="+213">الجزائر (+213)</option>
                <option value="+216">تونس (+216)</option>
                <option value="+218">ليبيا (+218)</option>
                <option value="+249">السودان (+249)</option>
                <option value="+967">اليمن (+967)</option>
                <option value="+1">أمريكا/كندا (+1)</option>
                <option value="+44">بريطانيا (+44)</option>
                <option value="+49">ألمانيا (+49)</option>
                <option value="+33">فرنسا (+33)</option>
                <option value="+7">روسيا (+7)</option>
                <option value="+90">تركيا (+90)</option>
            </select>
        </div>
        <div class="input-group">
            <label>رقم الهاتف</label>
            <input type="tel" id="reg-phone" placeholder="رقم الهاتف">
        </div>
        <button class="btn btn-primary" onclick="validateStep1()">التالي</button>
        <div class="step-dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
</div>

<div id="reg-step-2" class="screen">
    <div class="auth-container">
        <h2>خطوة 2/4</h2>
        <div class="input-group">
            <input type="text" id="reg-name" placeholder="الاسم الكامل">
        </div>
        <div class="input-group">
            <input type="email" id="reg-email" placeholder="البريد الإلكتروني">
        </div>
        <button class="btn btn-primary" onclick="showScreen('reg-step-3')">التالي</button>
        <div class="step-dots"><div class="dot"></div><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
</div>

<div id="reg-step-3" class="screen">
    <div class="auth-container">
        <h2>خطوة 3/4</h2>
        <div class="input-group">
            <label>تاريخ الميلاد</label>
            <input type="date" id="reg-birth">
        </div>
        <div class="input-group">
            <input type="password" id="reg-pass" placeholder="كلمة المرور (8 رموز على الأقل)">
        </div>
        <button class="btn btn-primary" onclick="showScreen('reg-step-4')">التالي</button>
        <div class="step-dots"><div class="dot"></div><div class="dot"></div><div class="dot active"></div><div class="dot"></div></div>
    </div>
</div>

<div id="reg-step-4" class="screen">
    <div class="auth-container">
        <h2>الخطوة الأخيرة</h2>
        <div class="input-group">
            <input type="password" id="reg-pass-confirm" placeholder="تأكيد كلمة المرور">
        </div>
        <button class="btn btn-primary" onclick="finalRegister()">إتمام التسجيل والدخول</button>
        <div class="step-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot active"></div></div>
    </div>
</div>

<div id="main-app" class="screen">
    <h1>مرحباً بك في صـوتي 🎙️</h1>
    <p>جاري تحميل الواجهة الرئيسية...</p>
</div>

<script>
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function updateCountryCode() {
        const code = document.getElementById('reg-country').value;
        const phoneInput = document.getElementById('reg-phone');
        if(code) phoneInput.value = code + " ";
    }

    function validateStep1() {
        const phone = document.getElementById('reg-phone').value.trim();
        const country = document.getElementById('reg-country').value;
        if(!country) { alert("من فضلك اختر الدولة أولاً"); return; }
        if(phone.length < 10) { alert("من فضلك أدخل رقم هاتف صحيح"); return; }
        showScreen('reg-step-2');
    }

    function handleLogin() {
        // التحقق من الحقول
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        if(email && pass) {
            // دخول فوري بدون Alert
            showScreen('main-app');
        } else {
            alert("يرجى ملء كافة البيانات");
        }
    }

    function finalRegister() {
        const p1 = document.getElementById('reg-pass').value;
        const p2 = document.getElementById('reg-pass-confirm').value;
        
        if(p1.length < 8 || !/\d/.test(p1)) {
            alert("كلمة المرور ضعيفة! يجب أن تكون 8 رموز وتضم أرقاماً");
            return;
        }
        if(p1 !== p2) {
            alert("كلمات المرور غير متطابقة");
            return;
        }
        
        // حفظ بيانات تجريبية والدخول فوراً بدون Alert
        localStorage.setItem('userName', document.getElementById('reg-name').value);
        showScreen('main-app');
    }
</script>

</body>
</html>
